name: Publish package

on:
  push:
    branches:
      - main
      - master

# Trusted Publishing (OIDC): no NPM_TOKEN or other npm secrets required.
# Register this workflow as a trusted publisher in npm package settings.
permissions:
  id-token: write # Required for npm Trusted Publishing (OIDC)
  contents: write # Required for @semantic-release/git to push release commit and tag

concurrency:
  group: ${{ github.workflow }}

jobs:
  publish-package:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
